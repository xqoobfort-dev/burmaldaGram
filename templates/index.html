<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burmaldagram</title>
    
    <!-- Подключаем паспорт PWA приложения -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1877f2">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 500px; height: 90vh; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #1877f2; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid white; }
        .header-username { font-weight: bold; font-size: 1.1rem; }
        .header-buttons { display: flex; gap: 8px; }
        .btn-header { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: background 0.2s; }
        .btn-header:hover { background: rgba(255,255,255,0.3); }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: #f7f9fa; display: flex; flex-direction: column; gap: 12px; }
        .message-container { display: flex; align-items: flex-start; gap: 10px; animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .msg-content { background: white; padding: 8px 12px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); max-width: 80%; }
        .msg-author { font-weight: bold; color: #1877f2; font-size: 0.9rem; margin-bottom: 2px; display: block; }
        .msg-text { color: #000000; font-size: 0.95rem; word-break: break-word; }
        .chat-input-area { padding: 15px; background: white; border-top: 1px solid #e4e6eb; display: flex; gap: 10px; }
        .input-message { flex: 1; padding: 10px 15px; border: 1px solid #ccd0d5; border-radius: 20px; outline: none; font-size: 0.95rem; transition: border-color 0.2s; }
        .input-message:focus { border-color: #1877f2; }
        .btn-send { background: #1877f2; color: white; border: none; padding: 0 20px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-send:hover { background: #145dbf; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="user-info">
            <div class="user-avatar">
                <img id="headerAvatar" src="https://flaticon.com" alt="Avatar">
            </div>
            <span class="header-username" id="headerUsername">Завантаження...</span>
        </div>
        <div class="header-buttons">
            <button class="btn-header" onclick="changeAvatar()">Фото</button>
            <button class="btn-header" style="background: #e41e3f;" onclick="clearChat()">Очистити</button>
        </div>
    </div>

    <div class="chat-messages" id="chat"></div>

    <div class="chat-input-area">
        <input type="text" class="input-message" id="messageInput" placeholder="Напишіть повідомлення..." onkeydown="if(event.key === 'Enter') sendMessage()">
        <button class="btn-send" onclick="sendMessage()">Текст</button>
    </div>
</div>

<script>
let username = localStorage.getItem('chat_username');
let avatarUrl = localStorage.getItem('chat_avatar');

if (!username) {
    username = prompt("Введіть ваш нікнейм для чату:");
    if (!username || username.trim() === "") {
        username = "Анонім_" + Math.floor(Math.random() * 1000);
    }
    avatarUrl = "https://flaticon.com";
    localStorage.setItem('chat_username', username);
    localStorage.setItem('chat_avatar', avatarUrl);
}

document.getElementById('headerUsername').textContent = username;
document.getElementById('headerAvatar').src = avatarUrl || "https://flaticon.com";

let lastMessageCount = 0;

async function checkMessages() {
    try {
        const res = await fetch('/get_messages');
        const messages = await res.json();
        
        if (messages.length > lastMessageCount) {
            const chatBox = document.getElementById('chat');
            chatBox.innerHTML = '';
            
            messages.forEach(data => {
                chatBox.innerHTML += `
                    <div class="message-container">
                        <img src="${data.avatar || 'https://flaticon.com'}" class="msg-avatar">
                        <div class="msg-content">
                            <span class="msg-author">${data.username}</span>
                            <span class="msg-text">${data.message}</span>
                        </div>
                    </div>
                `;
            });
            
            chatBox.scrollTop = chatBox.scrollHeight;
            
            const lastMsg = messages[messages.length - 1];
            if (lastMsg.username !== username && lastMessageCount > 0) {
                let audio = new Audio('/static/notification.mp3');
                audio.play().catch(() => {});
            }
            
            lastMessageCount = messages.length;
        }
    } catch (e) {
        console.error("Ошибка обновления чата:", e);
    }
}

async function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;
    
    try {
        await fetch('/send_message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                username: username, 
                message: text, 
                avatar: avatarUrl 
            })
        });
        input.value = '';
        checkMessages();
    } catch (e) {
        console.error("Ошибка отправки:", e);
    }
}

function changeAvatar() {
    const newUrl = prompt("Вставте посилання на нову аватарку (включаючи GIF):", avatarUrl);
    if (newUrl && newUrl.trim() !== "") {
        avatarUrl = newUrl.trim();
        localStorage.setItem('chat_avatar', avatarUrl);
        document.getElementById('headerAvatar').src = avatarUrl;
    }
}

async function clearChat() {
    if (confirm("Очистити історію для всіх?")) {
        await fetch('/clear_history', { method: 'POST' });
        lastMessageCount = 0;
        document.getElementById('chat').innerHTML = '';
        checkMessages();
    }
}

// Регистрация Service Worker для PWA фонового режима
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Фоновый режим успешно активирован!', reg))
            .catch(err => console.error('Ошибка активации PWA:', err));
    });
}

setInterval(checkMessages, 2500);
checkMessages();
</script>

</body>
</html>
